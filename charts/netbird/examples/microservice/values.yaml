fullnameOverride: netbird

server:
  enabled: false

management:
  enabled: true
  configmap: |-
    {
      "Stuns": [
        {
          "Proto": "udp",
          "URI": "{{ .STUN_SERVER }}",
          "Username": "",
          "Password": ""
        }
      ],
      "TURNConfig": {
        "TimeBasedCredentials": false,
        "CredentialsTTL": "12h0m0s",
        "Secret": "secret",
        "Turns": []
      },
      "Relay": {
        "Addresses": ["rels://netbird.example.com:443/relay"],
        "CredentialsTTL": "24h",
        "Secret": "{{ .RELAY_PASSWORD }}"
      },
      "Signal": {
        "Proto": "https",
        "URI": "netbird.example.com:443",
        "Username": "",
        "Password": ""
      },
      "Datadir": "/var/lib/netbird/",
      "DataStoreEncryptionKey": "{{ .DATASTORE_ENCRYPTION_KEY }}",
      "HttpConfig": {
        "AuthAudience": "{{ .IDP_CLIENT_ID }}",
        "AuthIssuer": "https://auth.example.com/application/o/netbird/",
        "AuthKeysLocation": "https://auth.example.com/application/o/netbird/jwks/"
      },
      "StoreConfig": {
        "Engine": "postgres"
      }
    }
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: netbird.example.com
        paths:
          - path: /api
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com
  ingressGrpc:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
    hosts:
      - host: netbird.example.com
        paths:
          - path: /management.ManagementService/
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com
  persistentVolume:
    enabled: false
  envFromSecret:
    NETBIRD_STORE_ENGINE_POSTGRES_DSN: netbird/postgresDSN
    STUN_SERVER: netbird/stunServer
    RELAY_PASSWORD: netbird/relayPassword
    DATASTORE_ENCRYPTION_KEY: netbird/datastoreEncryptionKey
    IDP_CLIENT_ID: netbird/idpClientID

signal:
  enabled: true
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
    hosts:
      - host: netbird.example.com
        paths:
          - path: /signalexchange.SignalExchange/
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com

relay:
  enabled: true
  stun:
    enabled: true
    ports:
      - 3478
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: netbird.example.com
        paths:
          - path: /relay
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com
  env:
    NB_LOG_LEVEL: info
    NB_LISTEN_ADDRESS: ":33080"
    NB_EXPOSED_ADDRESS: rels://netbird.example.com:443/relay
  envFromSecret:
    NB_AUTH_SECRET: netbird/relayPassword

dashboard:
  enabled: true
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: netbird.example.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com
  env:
    NETBIRD_MGMT_API_ENDPOINT: https://netbird.example.com:443
    NETBIRD_MGMT_GRPC_API_ENDPOINT: https://netbird.example.com:443
    AUTH_AUTHORITY: https://auth.example.com/application/o/netbird/
    USE_AUTH0: false
    AUTH_SUPPORTED_SCOPES: openid profile email offline_access api
  envFromSecret:
    AUTH_CLIENT_ID: netbird/idpClientID
