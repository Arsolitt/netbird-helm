fullnameOverride: netbird

server:
  enabled: true
  config:
    exposedAddress: "https://netbird.example.com:443"
    authSecret: "${AUTH_SECRET}"
    auth:
      issuer: "https://auth.example.com/application/o/netbird/"
  initContainer:
    envFromSecret:
      AUTH_SECRET: netbird/relayPassword
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: netbird.example.com
        paths:
          - path: /api
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com
  ingressGrpc:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
    hosts:
      - host: netbird.example.com
        paths:
          - path: /signalexchange.SignalExchange/
            pathType: ImplementationSpecific
          - path: /management.ManagementService/
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com

relay:
  instances:
    - name: default
      stun:
        enabled: true
        ports:
          - 3478
        service:
          type: LoadBalancer
          externalTrafficPolicy: Local
      ingress:
        enabled: true
        className: nginx
        hosts:
          - host: netbird.example.com
            paths:
              - path: /relay
                pathType: ImplementationSpecific
        tls:
          - secretName: wildcard-example-com-tls
            hosts:
              - netbird.example.com
      env:
        NB_LOG_LEVEL: info
        NB_LISTEN_ADDRESS: ":33080"
        NB_EXPOSED_ADDRESS: rels://netbird.example.com:443/relay
      envFromSecret:
        NB_AUTH_SECRET: netbird/relayPassword

dashboard:
  enabled: true
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: netbird.example.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-example-com-tls
        hosts:
          - netbird.example.com
  env:
    NETBIRD_MGMT_API_ENDPOINT: https://netbird.example.com:443
    NETBIRD_MGMT_GRPC_API_ENDPOINT: https://netbird.example.com:443
    AUTH_AUTHORITY: https://auth.example.com/application/o/netbird/
    USE_AUTH0: false
    AUTH_SUPPORTED_SCOPES: openid profile email offline_access api
  envFromSecret:
    AUTH_CLIENT_ID: netbird/idpClientID
