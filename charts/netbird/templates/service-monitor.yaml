{{- if and .Values.server.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "netbird.fullname" . }}
  namespace: {{ .Values.metrics.serviceMonitor.namespace | default (include "netbird.namespace" .) }}
  labels:
    {{- include "netbird.server.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
    - port: metrics
      {{- with .Values.metrics.serviceMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      path: /metrics
  namespaceSelector:
    matchNames:
      - {{ include "netbird.namespace" . }}
  selector:
    matchLabels:
      {{- include "netbird.server.selectorLabels" . | nindent 6 }}
{{- end -}}

{{- range $instance := .Values.relay.instances -}}
{{- if and $instance.metrics.enabled $.Values.metrics.serviceMonitor.enabled -}}
{{- $context := dict "root" $ "instance" $instance -}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "netbird.fullname" $ }}-relay-{{ $instance.name }}
  namespace: {{ $.Values.metrics.serviceMonitor.namespace | default (include "netbird.namespace" $) }}
  labels:
    {{- include "netbird.relay.labels" $context | nindent 4 }}
    {{- with $.Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $.Values.metrics.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
    - port: metrics
      {{- with $.Values.metrics.serviceMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with $.Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- with $.Values.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.metrics.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      path: /metrics
  namespaceSelector:
    matchNames:
      - {{ include "netbird.namespace" $ }}
  selector:
    matchLabels:
      {{- include "netbird.relay.selectorLabels" $context | nindent 6 }}
{{- end -}}
{{- end -}}
